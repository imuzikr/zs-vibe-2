<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PC image uploaded to GitHub and used as a story card URL</title>
  <desc id="desc">A minimalist educational workflow showing PC Image, GitHub Repo, Image URL, and Story Card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#f7f5f0"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ee9a82"/>
      <stop offset="1" stop-color="#d87963"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9bc8c2"/>
      <stop offset="1" stop-color="#6fa7a1"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#bfd8ee"/>
      <stop offset="1" stop-color="#8db7d9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4d58a"/>
      <stop offset="1" stop-color="#e3b75e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#2b2b2b" flood-opacity="0.16"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#2b2b2b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowTeal" markerWidth="18" markerHeight="18" refX="12" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L14 9 L2 16 Z" fill="#6fa7a1"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="742" rx="560" ry="58" fill="#2b2b2b" opacity="0.06"/>

  <g transform="translate(106 264)" filter="url(#softShadow)">
    <rect x="0" y="0" width="270" height="210" rx="22" fill="#fffdf7" stroke="#e3ded4"/>
    <rect x="0" y="0" width="270" height="54" rx="22" fill="url(#coral)"/>
    <circle cx="30" cy="28" r="10" fill="#d87963"/>
    <circle cx="60" cy="28" r="10" fill="#e3b75e"/>
    <circle cx="90" cy="28" r="10" fill="#6fa7a1"/>
    <rect x="34" y="80" width="202" height="102" rx="14" fill="#f2efe8" stroke="#e0d9ce"/>
    <path d="M58 158 L98 112 L130 144 L150 126 L212 174 L58 174 Z" fill="#7db4ae"/>
    <circle cx="184" cy="112" r="15" fill="#e3b75e"/>
    <rect x="150" y="138" width="110" height="82" rx="14" fill="#fffdf7" stroke="#ded7cc" transform="rotate(-7 205 179)"/>
    <rect x="168" y="157" width="72" height="8" rx="4" fill="#8db7d9"/>
    <rect x="168" y="176" width="54" height="8" rx="4" fill="#c7c1b8"/>
    <path d="M186 202 L206 186 L226 202" fill="none" stroke="#d87963" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="240" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#31424a">PC Image</text>

  <path d="M420 382 C464 382 486 382 530 382" fill="none" stroke="#6fa7a1" stroke-width="12" stroke-linecap="round" stroke-dasharray="1 28" marker-end="url(#arrowTeal)"/>

  <g transform="translate(570 224)" filter="url(#softShadow)">
    <rect x="0" y="54" width="320" height="250" rx="30" fill="#fffdf7" stroke="#e3ded4"/>
    <path d="M38 54 C62 24 92 12 128 18 L166 26 C198 32 230 24 254 0 L294 54 Z" fill="url(#teal)" opacity="0.9"/>
    <rect x="32" y="98" width="256" height="164" rx="18" fill="#f4f1eb" stroke="#e0d9ce"/>
    <rect x="58" y="128" width="78" height="98" rx="12" fill="#fffdf7" stroke="#d8d1c6"/>
    <path d="M78 196 L96 174 L112 192 L124 178 L148 210 L78 210 Z" fill="#7db4ae"/>
    <circle cx="126" cy="158" r="9" fill="#e3b75e"/>
    <rect x="162" y="136" width="92" height="10" rx="5" fill="#d87963"/>
    <rect x="162" y="162" width="74" height="10" rx="5" fill="#c6bfb5"/>
    <rect x="162" y="188" width="104" height="10" rx="5" fill="#c6bfb5"/>
    <circle cx="60" cy="278" r="8" fill="#d87963"/>
    <circle cx="86" cy="278" r="8" fill="#e3b75e"/>
    <circle cx="112" cy="278" r="8" fill="#6fa7a1"/>
  </g>
  <text x="730" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#31424a">GitHub Repo</text>

  <path d="M934 382 C978 382 996 382 1040 382" fill="none" stroke="#6fa7a1" stroke-width="12" stroke-linecap="round" stroke-dasharray="1 28" marker-end="url(#arrowTeal)"/>

  <g transform="translate(1000 306)" filter="url(#smallShadow)">
    <rect x="0" y="0" width="270" height="100" rx="28" fill="url(#blue)" stroke="#76a7cd"/>
    <circle cx="44" cy="50" r="24" fill="#fffdf7" opacity="0.96"/>
    <path d="M34 52 C36 38 52 34 60 44 C66 52 58 66 44 66 C36 66 32 60 34 52 Z" fill="#6fa7a1"/>
    <rect x="86" y="34" width="144" height="12" rx="6" fill="#fffdf7" opacity="0.9"/>
    <rect x="86" y="58" width="108" height="12" rx="6" fill="#fffdf7" opacity="0.72"/>
  </g>
  <text x="1135" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#31424a">Image URL</text>

  <path d="M1278 382 C1318 382 1330 382 1368 382" fill="none" stroke="#6fa7a1" stroke-width="12" stroke-linecap="round" stroke-dasharray="1 28" marker-end="url(#arrowTeal)"/>

  <g transform="translate(1284 188)" filter="url(#softShadow)">
    <rect x="0" y="0" width="250" height="334" rx="30" fill="#fffdf7" stroke="#e3ded4"/>
    <rect x="28" y="34" width="194" height="130" rx="16" fill="#f4f1eb" stroke="#ded7cc"/>
    <path d="M54 136 L90 90 L126 126 L146 104 L198 150 L54 150 Z" fill="#7db4ae"/>
    <circle cx="178" cy="80" r="16" fill="#e3b75e"/>
    <path d="M34 196 H218" stroke="#d9d3c9" stroke-width="12" stroke-linecap="round"/>
    <path d="M34 226 H178" stroke="#d9d3c9" stroke-width="12" stroke-linecap="round"/>
    <path d="M34 256 H218" stroke="#d9d3c9" stroke-width="12" stroke-linecap="round"/>
    <circle cx="48" cy="182" r="18" fill="url(#blue)"/>
    <rect x="72" y="174" width="118" height="12" rx="6" fill="#c7c1b8"/>
  </g>
  <text x="1410" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#31424a">Story Card</text>
</svg>
